services:
  postgres:
    image: postgres:16-alpine
    container_name: ft_test_postgres
    environment:
      POSTGRES_DB: francetravail_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d francetravail_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
