version: 2

sources:
  - name: france-travail
    description: "Tables raw issues de l'extraction France Travail."
    database: "{{ target.project if target.type == 'bigquery' else target.database }}"
    schema: "{{ target.schema }}"
    tables:
      - name: staging_offres_ft
        
  - name: geo-api
    description: "Tables raw issues de l'API geo (communes, departements, regions, epcis)."
    database: "{{ target.project if target.type == 'bigquery' else target.database }}"
    schema: "{{ target.schema }}"
    tables:
      - name: staging_communes
      - name: staging_departements
      - name: staging_regions
      - name: staging_epcis

  - name: adzuna
    description: "Tables raw issues de l'extraction Adzuna."
    database: "{{ target.project if target.type == 'bigquery' else target.database }}"
    schema: "{{ target.schema }}"
    tables:
      - name: staging_offres_adzuna
