version: 2

models:
  - name: int_geo_communes
    description: >
      Referentiel communal enrichi (communes, departements, regions, EPCI).
      Une ligne par couple (commune, code_postal).
    columns:
      - name: commune_code
        description: "Code INSEE de la commune."
        tests:
          - not_null
      - name: code_postal
        description: "Code postal de la commune."
        tests:
          - not_null
      - name: departement_code
        description: "Code departement (ex: 75)."
        tests:
          - not_null

  - name: int_employer_candidates
    description: "Employeurs dedupliques pour matching Sirene."
    columns:
      - name: employer_candidate_id
        description: "Cle unique generee (Nom|CP|Commune|NAF)."
        tests:
          - not_null
          - unique
      - name: offer_count
        description: "Nombre d'offres associees."

  - name: int_ft_offres_geo
    description: "Enrichissement geographique des offres France Travail."
    columns:
      - name: offer_id
        description: "ID unique de l'offre."
        tests:
          - not_null
          - unique
      - name: departement_nom
        description: "Nom du departement."
        tests:
          - not_null

  - name: int_ft_offres_enriched
    description: "Table finale consolidee."
    columns:
      - name: offer_id
        tests:
          - not_null
          - unique
      - name: region_nom
        tests:
          - not_null
