version: 2

models:
  - name: int_geo_communes
    description: >
      Referentiel communal enrichi (communes, departements, regions, EPCI).
      Une ligne par couple (commune, code_postal).
    columns:
      - name: commune_code
        description: "Code INSEE de la commune."
        tests:
          - not_null
      - name: code_postal
        description: "Code postal de la commune."
        tests:
          - not_null
      - name: departement_code
        description: "Code departement (ex: 75)."
        tests:
          - not_null

  - name: int_ft_offres_silver
    description: "Table consolidée des offres France Travail enrichie géographiquement."
    columns:
      - name: offer_id
        description: "ID unique de l'offre."
        tests:
          - not_null
          - unique
      - name: commune_name
        description: "Nom de la commune (issu du référentiel ou de la source)."
      - name: region_nom
        description: "Nom de la région."
      - name: has_salary_info
        description: "Flag indiquant la présence d'informations de salaire (0 ou 1)."
      - name: is_geo_matched
        description: "Flag indiquant si l'offre a été matchée avec le référentiel GÉO (0 ou 1)."
