name: CD - Semantic Release & Docker

on:
  push:
    branches:
      - main
      - integration # Le robot écoute maintenant ces deux branches

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Lancement de Python Semantic Release
      - name: Python Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Préparation de Docker
      - name: Set up Docker Buildx
        if: steps.semantic.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      # 3. Connexion au registre Docker (DockerHub)
      - name: Login to Docker Hub
        if: steps.semantic.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Envoi de l'image Docker avec la version calculée (ex: 1.2.0 ou 1.2.0-beta.1)
      - name: Build and push Docker image
        if: steps.semantic.outputs.released == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # On tague l'image avec la version exacte calculée par Semantic Release
          tags: mon-compte/mon-app:${{ steps.semantic.outputs.version }}
