name: CI - Tests & Securite

on:
  pull_request:
    branches:
      - main
      - integration
    paths-ignore:
      - "_*/**"
      - "**/_*/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan des secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Installer uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Installer les dépendances
        run: uv sync --all-extras --dev

      - name: Linter le code Python (Ruff)
        run: uv run ruff check .

      - name: Dbt - Verification du graphe et de la syntaxe
        run: |
          uv run dbt parse --project-dir 03_transform/dbt --profiles-dir 03_transform/dbt --target local

      - name: Dbt - Linter SQL (SQLFluff)
        run: |
          uv run sqlfluff lint 03_transform/dbt/models --dialect bigquery
